<!DOCTYPE html>
<html>
<head>
<title>Settings</title>
<link rel="stylesheet" href="/static/css/settings.css">
</head>
<body>
<div class="card">
<h1>Settings</h1>
<hr>
<h3>Account Information</h3>

<p><strong style="font-size: 16px; color: gray;">Username:</strong> {{ user[0] }}</p>
<p><strong style="font-size: 16px; color: gray;">Email:</strong> {{ user[1] }}</p>

<hr>

<h3>Change Password</h3>

<form method="POST" action="/change_password">
    <input type="password" name="current_password" placeholder="Current Password" required>
    <br><br>
    <input type="password" name="new_password" placeholder="New Password" required>
    <br><br>
    <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
    <br><br>
    <button type="submit">Update Password</button>
</form>

<hr>

<br>
<a href="/dashboard">Back to Dashboard</a>
</div>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <p id="flash-data" style="display:none;">{{ messages[0] }}</p>
  {% endif %}
{% endwith %}

</body>

<script>
const flashEl = document.getElementById("flash-data");
if (flashEl) {
    const flashMessage = flashEl.textContent;
    if (flashMessage.includes("Incorrect") || flashMessage.includes("match")) {
        flashEl.style.display = 'flex';
        flashEl.style.backgroundColor = 'rgba(247, 71, 71, 0.8)';
    } else {
        flashEl.style.display = 'flex';
        flashEl.style.backgroundColor = 'green';
    }
}
</script>

</html>
