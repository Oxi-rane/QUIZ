<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="/static/css/login.css">
  
</head>
<body>
 
<div class="card">
  <div class="badge">Welcome back</div>
  <h2>Sign into your<br><em style="color: #4ade80">account</em></h2>
  <p class="subtitle"style="color: gray">Good to see you again.</p>

  <form method="POST" action="/login">
    <div class="field">
      <label for="identifier">Username or Email</label>
      <input type="text" id="identifier" name="identifier" placeholder="you@example.com" required>
    </div>

    <div class="field">
      <div class="field-row">
        <label for="password">Password</label>
      </div>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
     
    </div>

    <button type="submit">Sign In →</button>
  </form>

  <div class="divider"></div>

  <p class="register-link">Don't have an account? <a href="/register">Create one</a></p>
</div>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <p id="error" style="color:aliceblue;">{{ messages[0] }}</p>
  {% endif %}
{% endwith %}

</body>


</html>
