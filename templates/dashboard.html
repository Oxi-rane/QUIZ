<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>



<body>
<nav id="dashboard">

    <h1>Dashboard</h1>
    <hr>

    <p>Welcome {{ username }}</p>
    <p>Your Score: {{score}}</p>


    <div id="Actions">
        <h3>Actions</h3>

        <ul>
            <li><a href="/profile"> 👤 Profile</a></li>
            <li><a href="/settings"> 🛠️ Settings</a></li>
            <li><a href="/logout" onclick="return confirm('Are you sure you want to logout?')"> 🚪Logout</a></li>
        </ul>
    </div>
</nav>
<main>
    <div id="category" class="category-bar">
    {% for cat in categories %}
    <div class="category-wrapper">
    <div class="category">
        {{ cat['name'] }}
        <div class="quiz-dropdown">
            {% for quiz in cat['quizzes'] %}
                <a href="#" onclick="loadQuiz({{ quiz['quiz_id'] }}); return false;">
                {{ quiz['title'] }}
                </a>
                
            {% endfor %}
        </div>
    </div>
    </div>
    {% endfor %}
</div>

<div id="quiz">
<h1 id="quiz-name">Daily Quiz</h1>
<div id="question">
<p id="question-text"></p>
<div id="options"></div>

</div>
<button id="prev" onclick="prevQuestion()">← Prev</button>
<button id="next" onclick="nextQuestion()">Next →</button>

</div> 

    
</div>


</main>
<div id="custom-quiz" style="display:none;">
    <h2 id="custom-quiz-title"></h2>
    <div id="custom-quiz-questions"></div>
    <button id="back-to-dashboard" onclick="backToDashboard()">Back</button>
    <button id="submit" onclick="submitQuiz()">Submit Quiz</button>
        
</div>>




</div>

  <div id="attempts-table-header">
    <span>Quiz</span>
    <span>Score</span>
  </div>
  <ol id="attempts-list"></ol>
  <div id="attempts-empty" style="display:none;">
    <p id="attempts-head2"></p>
    <div id="category-suggestions"></div>

</div>


</body>

<script>
let current=0;
const dailies = {{ dailies | tojson }};
const attempts={{attempts|tojson}};
let answers={{answers|tojson}};
const cats = {{ categories | tojson }};
function renderQuestion(){

    const q = dailies[current];

    document.getElementById("question-text").textContent = q.text;

    let html = "";

    for (let opt of q.options){
        html += `
        <label>
            <input type="radio" name="question" value="${opt.id}">
            ${opt.text}
        </label><br>
        `;
    }

    document.getElementById("options").innerHTML = html;

    const radios = document.querySelectorAll('input[name="question"]');

    radios.forEach(radio=>{
        radio.addEventListener("change", function(){
            checkAnswer(q.id, parseInt(this.value));
        });
    });

    if(answers[q.id]){
        showAnswer(q.id, answers[q.id]);
    }
}

function nextQuestion(){
    if(current < dailies.length - 1){
        current++;
        renderQuestion();
    }
}

function prevQuestion(){
    if(current > 0){
        current--;
        renderQuestion();
    }
}
async function checkAnswer(questionId, selectedOption){

    const res = await fetch("/check_answer",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            question_id:questionId,
            answer:selectedOption
        })
    });

    const result = await res.json();

    answers[questionId] = selectedOption;

    const radios = document.querySelectorAll('input[name="question"]');

    radios.forEach(radio=>{

        const label = radio.parentElement;
        const value = parseInt(radio.value);

        radio.disabled = true;

        if(value === result.correct_option){
          label.style.backgroundColor = "rgba(100, 220, 100, 0.15)";
          label.style.border = "1px solid rgba(100, 220, 100, 0.6)";
          label.style.color = "rgb(136, 252, 185)"         
        }

        if(value === selectedOption && !result.correct){
          label.style.backgroundColor = "rgba(220, 80, 80, 0.15)";
          label.style.border = "1px solid rgba(220, 80, 80, 0.6)";
          label.style.color = "rgb(252, 136, 136)";
        }

    });
}
async function showAnswer(questionId, selectedOption){

    const res = await fetch("/show_answer",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            question_id:questionId,
            answer:selectedOption
        })
    });

    const result = await res.json();

    answers[questionId] = selectedOption;

    const radios = document.querySelectorAll('input[name="question"]');

    radios.forEach(radio=>{

        const label = radio.parentElement;
        const value = parseInt(radio.value);

        radio.disabled = true;

        if(value === result.correct_option){
          label.style.backgroundColor = "rgba(100, 220, 100, 0.15)";
          label.style.border = "1px solid rgba(100, 220, 100, 0.6)";
          label.style.color = "rgb(136, 252, 185)"
        }

        if(value === selectedOption && !result.correct){
          label.style.backgroundColor = "rgba(220, 80, 80, 0.15)";
          label.style.border = "1px solid rgba(220, 80, 80, 0.6)";
          label.style.color = "rgb(252, 136, 136)";
        }

    });
}
let quizAnswers = {};
async function loadQuiz(quiz_id){
    try {
        const res = await fetch(`/get_quiz/${quiz_id}`);
        const data = await res.json();

        if(!data.questions || data.questions.length === 0) return;

        document.getElementById('quiz').style.display='none';
        document.getElementById('attempts').style.display='none';
        document.querySelector('.category-bar').style.display='none';
       
        const customQuizDiv = document.getElementById('custom-quiz');
        customQuizDiv.style.display = 'block';

        document.getElementById('custom-quiz-title').textContent = data.title;

  
        const questionsDiv = document.getElementById('custom-quiz-questions');
        questionsDiv.innerHTML = ''; 

        data.questions.forEach(q => {
            let html = `<div class="question" id="question-${q.id}">
                            <p>${q.text}</p>`;
            q.options.forEach(opt => {
                html += `
                    <label>
                        <input type="radio" name="q${q.id}" value="${opt.id}">
                        ${opt.text}
                    </label><br>
                `;
            });
            html += `</div>`;

            questionsDiv.innerHTML += html;
            
            
        });
        const radios = document.querySelectorAll('#custom-quiz-questions input[type="radio"]');
       
        quizAnswers[quiz_id]={};
        radios.forEach(radio => {
            radio.addEventListener("change", function(){

                const questionId = this.name.replace("q", "");
                const selectedOption = parseInt(this.value);

                quizAnswers[quiz_id][questionId] = selectedOption;

                const questionDiv = this.closest(".question");

               

            });
        });

    } catch(e) {
        console.error(e);
        alert("Failed to load quiz");
    }
}
function backToDashboard() {
    document.getElementById('custom-quiz').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    document.querySelector('.category-bar').style.display = 'flex';
    document.getElementById('attempts').style.display='flex';
}
async function submitQuiz(){

    const res = await fetch("/submit_quiz", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            answers: quizAnswers
        })
    });

    const result = await res.json();

    
    const correctAnswers = result.correct_answers;
    const quiz_id=result.quiz_id;
    for (const [questionId, correctOptionId] of Object.entries(correctAnswers)) {
        const selectedOption = quizAnswers[quiz_id][questionId];
        const questionDiv = document.getElementById(`question-${questionId}`);
        if (!questionDiv) continue;

        const radios = questionDiv.querySelectorAll("input[type='radio']");
        radios.forEach(radio => {
            const label = radio.parentElement;
            const value = parseInt(radio.value);
        
            radio.disabled = true;
         
            if (value === correctOptionId) {
                label.style.backgroundColor = "rgba(100, 220, 100, 0.15)";
                label.style.border = "1px solid rgba(100, 220, 100, 0.6)";
                label.style.color = "rgb(136, 252, 185)";
            }
            if (value === parseInt(selectedOption) && value !== correctOptionId) {
                label.style.backgroundColor = "rgba(220, 80, 80, 0.15)";
                label.style.border = "1px solid rgba(220, 80, 80, 0.6)";
                label.style.color = "rgb(252, 136, 136)";
            }
        });
    }

    alert(`Score: ${result.score} / 100`);
}
function top_attempts() {
  if (!attempts || attempts.length === 0){
    document.getElementById('attempts-head').textContent = 'Get Started';
    document.getElementById('attempts-table-header').style.display = 'none';
    document.getElementById('attempts-head2').textContent = "You haven't played any quiz yet. Pick one:";
    document.getElementById('attempts-empty').style.display = 'block';

   
    const container = document.getElementById('category-suggestions');
   
    cats.forEach(cat => {
     
        const p = document.createElement('p');
        p.className = 'suggestion-item';
        p.textContent = cat.name;
      
        container.appendChild(p);
      
    });
  }
  else{
    const ol = document.getElementById('attempts-list');
    for (let quiz of attempts){
      const li = document.createElement('li');
      const title = document.createElement('span');
      title.textContent = quiz.title;
      const score = document.createElement('span');
      score.textContent = quiz.score;
      li.appendChild(title);
      li.appendChild(score);
      ol.appendChild(li);
    }
  }
}
window.onload =top_attempts();
window.onload = renderQuestion();

</script>
