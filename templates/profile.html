<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="/static/css/profile.css">
   
</head>
<body>
<div class="card">

  <div class="card-header">
    <div class="avatar">{{ user[0][0] | upper }}</div>
    <div class="user-meta">
      <h2>{{ user[0] }}</h2>
      <p>{{ user[1] }}</p>
    </div>
  </div>

  <hr>

  <div class="stats-row">
    <div class="stat-box">
      <span class="val">{{ user[2] }}</span>
      <span class="lbl">Total Score</span>
    </div>
    <div class="stat-box">
      <span class="val">#{{ rank }}</span>
      <span class="lbl">Your Rank</span>
    </div>
    <div class="stat-box">
      <span class="val">{{ best }}</span>
      <span class="lbl">Best Quiz</span>
    </div>
  </div>

  <hr>

  <div class="section">
    <h4>🏆 Leaderboard</h4>
    {% for entry in leaderboard %}
    <div class="leaderboard-row {% if entry[0] == user[0] %}highlight{% endif %}">
      <span class="pos">{{ loop.index }}</span>
      <span class="name">{{ entry[0] }}</span>
      <span class="pts">{{ entry[1] }} pts</span>
    </div>
    {% endfor %}
  </div>

  <hr>

  <div class="card-footer">
    <a href="/settings">⚙️ Settings</a>
    <a href="/dashboard">← Dashboard</a>
  </div>

</div>
</body>


</html>
