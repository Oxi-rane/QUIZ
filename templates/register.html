<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="/static/css/register.css">
 
</head>
<body>

<div class="card">
  <div class="badge">New account</div>
  <h2>Create your<br><em style="color: #4ade80">account</em></h2>
  <p class="subtitle" style="color: gray">Join us — it only takes a moment.</p>

  <form method="POST" action="/register">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="your_handle" required>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>

    <button type="submit">Create Account →</button>
  </form>

  <div class="divider"></div>

  <p class="login-link">Already have an account? <a href="/login">Sign in</a></p>
</div>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <p id="error" style="color:aliceblue;">{{ messages[0] }}</p>
  {% endif %}
{% endwith %}
</body>


</html>
